    margin-bottom: 14px;
    color: #444;

  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .legend i {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;

  }
  .hint {
    font-size: 12px;
    color: #6b6b6b;
    margin-bottom: 18px;
    font-style: italic;
  }
  .svg-wrap {
    background: #ffffff;
    border: 1px solid #e1ddd4;
    border-radius: 6px;
    padding: 10px;
    overflow: auto;
  }
  svg { display: block; width: 100%; height: auto; }

  /* ===== Tooltip styling ===== */
  .tooltip {
    position: absolute;
    background: #1a1a1a;
    color: #ffffff;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    pointer-events: none;
    white-space: nowrap;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.18s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .tooltip.visible {
    opacity: 1;
  }

  /* ===== Clickable node styling ===== */
  a.node {
    cursor: pointer;
    text-decoration: none;
    outline: none;
  }
  a.node rect {
    transition: transform 0.18s ease, filter 0.18s ease, stroke-width 0.18s ease, fill 0.18s ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  a.node text {
    pointer-events: none;
    transition: fill 0.18s ease;
  }

  /* Hover: lift, brighten, thicker stroke */
  a.node:hover rect {
    filter: brightness(1.12) drop-shadow(0 4px 8px rgba(0,0,0,0.18));
    stroke-width: 2.5;
    transform: scale(1.025);
  }
  a.node:focus-visible rect {
    stroke: #c9a86a;
    stroke-width: 3;
  }

  /* Specific hover hue tweaks for the lighter palette so text stays readable */
  a.node.is-prop:hover rect {
    fill: #d8c8a8;
  }
  a.node.is-util:hover rect {
    fill: #f3eee2;
    stroke: #8a8273;
  }
  a.node.is-sub:hover rect {
    fill: #8e9e96;
  }
  a.node.is-main:hover rect {
    fill: #4d6157;
  }
  a.node.is-root:hover rect {
    fill: #2a2a2a;
  }

  /* 404 / Error status boxes */
  a.node.is-error rect {
    fill: #d32f2f;
    stroke: #b71c1c;
  }
  a.node.is-error text {
    fill: #ffffff;
  }
  a.node.is-error:hover rect {
    fill: #f44336;
    filter: brightness(1.12) drop-shadow(0 4px 8px rgba(0,0,0,0.25));
  }

  /* 301 / Redirect status boxes */
  a.node.is-redirect rect {
    fill: #ff9800;
    stroke: #f57c00;
  }
  a.node.is-redirect text {
    fill: #ffffff;
  }
  a.node.is-redirect:hover rect {
    fill: #ffb74d;
    filter: brightness(1.12) drop-shadow(0 4px 8px rgba(0,0,0,0.25));
  }
</style>

  <script>
    const tooltip = document.getElementById('tooltip');
    const nodes = document.querySelectorAll('a.node');

    nodes.forEach(node => {
      const url = node.getAttribute('href');
      
      node.addEventListener('mouseenter', (e) => {
        tooltip.textContent = url;
        tooltip.classList.add('visible');
        updateTooltipPosition(e);
      });

      node.addEventListener('mousemove', (e) => {
        updateTooltipPosition(e);
      });

      node.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
      });
    });

    function updateTooltipPosition(e) {
      const offset = 10;
      tooltip.style.left = (e.pageX + offset) + 'px';
      tooltip.style.top = (e.pageY + offset) + 'px';
    }
  </script>
